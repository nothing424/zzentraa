<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentra - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0B1020;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
      padding: 20px;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #4F8CFF, #7C5CFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .icon {
      width: 80px; height: 80px;
      background: rgba(79,140,255,0.1);
      border: 1px solid rgba(79,140,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto;
    }
    h2 { font-size: 1.3rem; }
    p { color: #A8B3CF; font-size: 0.9rem; max-width: 300px; line-height: 1.6; }
    button {
      background: linear-gradient(135deg, #4F8CFF, #7C5CFF);
      border: none;
      color: #fff;
      padding: 12px 28px;
      border-radius: 99px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="logo">ZENTRA</div>
  <div class="icon">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4F8CFF" stroke-width="2">
      <path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/>
      <line x1="8" y1="2" x2="8" y2="18"/>
      <line x1="16" y1="6" x2="16" y2="22"/>
    </svg>
  </div>
  <h2>Kamu Sedang Offline</h2>
  <p>Periksa koneksi internetmu dan coba lagi. Beberapa konten mungkin tersedia dari cache.</p>
  <button onclick="window.location.reload()">Coba Lagi</button>
</body>
</html>
